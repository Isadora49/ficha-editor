<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gerador de PDF Editável 2026</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>Gerador de Campo de Imagem Editável</h1>
        
        <div class="upload-section">
            <label>Suba o PDF Base:</label>
            <input type="file" id="pdfInput" accept=".pdf">
        </div>

        <div class="controls">
            <button id="processBtn">Gerar PDF com Campo de Imagem</button>
        </div>

        <div id="previewArea">
            <iframe id="pdfPreview"></iframe>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
