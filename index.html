<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor Interativo de PDF</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://unpkg.com/interactjs/dist/interact.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>Editor de PDF Editável</h1>
        
        <div class="upload-section">
            <div class="input-group">
                <label>1. Arquivo PDF:</label>
                <input type="file" id="pdfInput" accept=".pdf">
            </div>
            <div class="input-group">
                <label>2. Foto/Imagem:</label>
                <input type="file" id="imageInput" accept="image/*">
            </div>
        </div>

        <div class="controls">
            <button id="processBtn">Gerar e Baixar PDF Final</button>
            <p class="instruction">Arraste e redimensione a moldura azul sobre o PDF.</p>
        </div>

        <div id="canvas-wrapper">
            <iframe id="pdfPreview"></iframe>
            
            <div id="image-field" class="resize-drag">
                <div class="image-content">Posicione a Imagem Aqui</div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
