<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Editor PDF - Correção Definitiva</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #111; color: #eee; margin: 0; display: flex; flex-direction: column; align-items: center; }
        #toolbar { background: #222; width: 100%; padding: 15px; display: flex; justify-content: center; gap: 10px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #444; }
        #editor-container { position: relative; margin: 20px; background: white; display: none; box-shadow: 0 0 20px rgba(0,0,0,0.5); }
        canvas { display: block; }
        .draggable-field {
            position: absolute; width: 150px; height: 100px;
            background: rgba(0, 123, 255, 0.4); border: 2px solid #007bff;
            color: white; display: flex; align-items: center; justify-content: center;
            cursor: move; touch-action: none; font-weight: bold; font-size: 12px; z-index: 10;
        }
        button { padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-add { background: #007bff; color: white; display: none; }
        .btn-save { background: #28a745; color: white; display: none; }
        #status { position: fixed; bottom: 0; width: 100%; background: #000; padding: 5px; text-align: center; color: #28a745; font-family: monospace; }
    </style>
</head>
<body>

<div id="toolbar">
    <input type="file" id="pdf-input" accept=".pdf">
    <button id="add-btn" class="btn-add">Adicionar Campos</button>
    <button id="save-btn" class="btn-save">Baixar PDF</button>
</div>

<div id="editor-container">
    <canvas id="pdf-render"></canvas>
</div>

<div id="status">Selecione um PDF para começar.</div>

<script>
    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    let originalPdfBytes = null;
    let pdfDocGlobal = null;

    // 1. CARREGAR PDF
    document.getElementById('pdf-input').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        document.getElementById('status').innerText = "Processando...";
        originalPdfBytes = await file.arrayBuffer();
        
        const loadingTask = pdfjsLib.getDocument({ data: originalPdfBytes });
        pdfDocGlobal = await loadingTask.promise;
        const page = await pdfDocGlobal.getPage(1);
        
        const scale = 1.5;
        const viewport = page.getViewport({ scale });
        const canvas = document.getElementById('pdf-render');
        const context = canvas.getContext('2d');
        canvas.height = viewport.height;
        canvas.width = viewport.width;

        await page.render({ canvasContext: context, viewport: viewport }).promise;
        
        document.getElementById('editor-container').style.display = 'block';
        document.getElementById('add-btn').style.display = 'inline-block';
        document.getElementById('status').innerText = "PDF Carregado.";
    });

    // 2. CRIAR CAMPOS (DRAG & RESIZE)
    document.getElementById('add-btn').addEventListener('click', () => {
        spawnField("CAMPO_1", 50, 50);
        spawnField("CAMPO_2", 250, 50);
        document.getElementById('add-btn').style.display = 'none';
        document.getElementById('save-btn').style.display = 'inline-block';
    });

    function spawnField(id, x, y) {
        const el = document.createElement('div');
        el.className = 'draggable-field';
        el.id = id;
        el.innerText = id.replace('_', ' ');
        el.style.left = x + 'px';
        el.style.top = y + 'px';
        document.getElementById('editor-container').appendChild(el);

        interact(el).draggable({
            listeners: { move(event) {
                const t = event.target;
                const x = (parseFloat(t.getAttribute('data-x')) || 0) + event.dx;
                const y = (parseFloat(t.getAttribute('data-y')) || 0) + event.dy;
                t.style.transform = `translate(${x}px, ${y}px)`;
                t.setAttribute('data-x', x);
                t.setAttribute('data-y', y);
            }}
        }).resizable({
            edges: { left: true, right: true, bottom: true, top: true },
            listeners: { move(event) {
                const t = event.target;
                let x = (parseFloat(t.getAttribute('data-x')) || 0);
                let y = (parseFloat(t.getAttribute('data-y')) || 0);
                t.style.width = event.rect.width + 'px';
                t.style.height = event.rect.height + 'px';
                x += event.deltaRect.left;
                y += event.deltaRect.top;
                t.style.transform = `translate(${x}px, ${y}px)`;
                t.setAttribute('data-x', x);
                t.setAttribute('data-y', y);
            }}
        });
    }

    // 3. SALVAR (O CONSERTO DO NaN)
    document.getElementById('save-btn').addEventListener('click', async () => {
        try {
            document.getElementById('status').innerText = "Gerando PDF seguro...";
            const { PDFDocument } = PDFLib;
            const pdfDoc = await PDFDocument.load(originalPdfBytes);
            const form = pdfDoc.getForm();
            const page = pdfDoc.getPage(0);
            const { width, height } = page.getSize();
            const canvas = document.getElementById('pdf-render');

            const scaleX = width / canvas.width;
            const scaleY = height / canvas.height;

            const fields = document.querySelectorAll('.draggable-field');
            
            fields.forEach((div, index) => {
                const rect = div.getBoundingClientRect();
                const containerRect = document.getElementById('editor-container').getBoundingClientRect();

                // Cálculo manual robusto
                const rawX = (rect.left - containerRect.left) * scaleX;
                const rawY = height - ((rect.top - containerRect.top + rect.height) * scaleY);
                const rawW = rect.width * scaleX;
                const rawH = rect.height * scaleY;

                // FILTRO ANTI-NaN: Se não for número, usa valor padrão
                const finalX = isNaN(rawX) ? 10 : Number(rawX);
                const finalY = isNaN(rawY) ? 10 : Number(rawY);
                const finalW = isNaN(rawW) || rawW <= 0 ? 100 : Number(rawW);
                const finalH = isNaN(rawH) || rawH <= 0 ? 50 : Number(rawH);

                // NOME DO CAMPO: Deve ser string pura
                const fieldName = String("imagem_" + index + "_" + Date.now());

                const button = form.createButton(fieldName);
                button.addToPage(page, {
                    x: finalX,
                    y: finalY,
                    width: finalW,
                    height: finalH
                });
            });

            const pdfBytes = await pdfDoc.save();
            const blob = new Blob([pdfBytes], { type: 'application/pdf' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = "pdf_editavel.pdf";
            link.click();
            document.getElementById('status').innerText = "Sucesso!";
        } catch (err) {
            console.error(err);
            document.getElementById('status').innerText = "Erro: " + err.message;
        }
    });
</script>

</body>
</html>
