<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Interactive Editor 2026</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>Editor de PDF Interativo</h1>
        
        <div class="upload-section">
            <div class="field">
                <label>1. Escolha o PDF:</label>
                <input type="file" id="pdfInput" accept=".pdf">
            </div>
            <div class="field">
                <label>2. Escolha a Imagem:</label>
                <input type="file" id="imageInput" accept="image/*">
            </div>
        </div>

        <div class="controls">
            <button id="processBtn">Gerar e Baixar PDF Final</button>
            <p class="hint">Arraste a imagem e use as bordas para redimensionar.</p>
        </div>

        <div id="editorWrapper">
            <div id="pdfCanvasContainer">
                <canvas id="pdfRenderCanvas"></canvas>
                <div id="resizableImage" class="draggable">
                    <div class="resizer sw"></div>
                    <div class="resizer se"></div>
                </div>
            </div>
        </div>
    </div>
