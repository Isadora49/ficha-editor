<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Editável Pro 2026</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://unpkg.com/interactjs/dist/interact.min.js"></script>
</head>
<body>
    <div class="container">
        <h1>Edator de PDF: Campo de Foto</h1>
        
        <div class="upload-section">
            <label><strong>1. Carregue seu PDF:</strong></label><br><br>
            <input type="file" id="pdfInput" accept=".pdf">
        </div>

        <p class="instruction">Arraste e ajuste o tamanho do quadro verde sobre o local da foto.</p>

        <div class="controls">
            <button id="processBtn" type="button">Gerar PDF para Preencher</button>
        </div>

        <div id="canvas-wrapper">
            <object id="pdfPreview" type="application/pdf"></object>
            
            <div id="image-field" class="resize-drag">
                <div class="image-content">ÁREA DA FOTO<br>(Clique p/ Inserir)</div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
