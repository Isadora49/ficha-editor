<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Editor de Campos de Imagem PDF</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>

    <style>
        :root { --primary: #2563eb; --success: #16a34a; --bg: #0f172a; }
        body { font-family: system-ui, sans-serif; background: var(--bg); color: white; margin: 0; overflow-x: hidden; }
        
        /* Barra de Ferramentas */
        #toolbar { 
            background: #1e293b; padding: 15px; display: flex; 
            gap: 15px; align-items: center; justify-content: center;
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #334155;
        }

        /* Área do Editor */
        #editor-wrapper { 
            display: flex; justify-content: center; padding: 20px; 
            min-height: 100vh; background: #0f172a; 
        }
        #pdf-container { 
            position: relative; background: white; box-shadow: 0 0 50px rgba(0,0,0,0.5);
            display: none; /* Só aparece após upload */
        }
        canvas { display: block; }

        /* Campos Arrastáveis */
        .field {
            position: absolute; width: 150px; height: 100px;
            background: rgba(37, 99, 235, 0.4); border: 2px solid var(--primary);
            color: white; font-size: 12px; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
            cursor: move; touch-action: none; user-select: none;
            box-sizing: border-box; z-index: 10;
        }
        .field::after {
            content: "AJUSTAR TAMANHO"; position: absolute; bottom: 5px; right: 5px;
            font-size: 8px; opacity: 0.7;
        }

        /* Botões */
        button { 
            padding: 10px 20px; border-radius: 6px; border: none; 
            cursor: pointer; font-weight: 600; transition: 0.2s;
        }
        .btn-upload { background: #e2e8f0; color: #0f172a; }
        .btn-add { background: var(--primary); color: white; display: none; }
        .btn-download { background: var(--success); color: white; display: none; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        button:disabled { background: #475569; cursor: not-allowed; }
    </style>
</head>
<body>

<div id="toolbar">
    <input type="file" id="file-input" accept=".pdf" style="display:none">
    <button class="btn-upload" onclick="document.getElementById('file-input').click()">1. Carregar PDF</button>
    <button id="add-btn" class="btn-add" onclick="spawnFields()">2. Adicionar 2 Campos</button>
    <button id="download-btn" class="btn-download" onclick="exportPDF()">3. Gerar e Baixar PDF</button>
</div>

<div id="editor-wrapper">
    <div id="pdf-container">
        <canvas id="pdf-canvas"></canvas>
        </div>
</div>

<script>
    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    let currentPdfBytes = null;
    let pdfPage = null;
    let scale = 1.5; // Ajusta a qualidade da visualização

    // 1. Carregamento e Visualização
    document.getElementById('file-input').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        currentPdfBytes = await file.arrayBuffer();
        const loadingTask = pdfjsLib.getDocument({ data: currentPdfBytes });
        const pdf = await loadingTask.promise;
        pdfPage = await pdf.getPage(1); // Focamos na primeira página

        const viewport = pdfPage.getViewport({ scale });
        const canvas = document.getElementById('pdf-canvas');
        const context = canvas.getContext('2d');
        
        canvas.height = viewport.height;
        canvas.width = viewport.width;

        await pdfPage.render({ canvasContext: context, viewport: viewport }).promise;

        document.getElementById('pdf-container').style.display = 'block';
        document.getElementById('add-btn
