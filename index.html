<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Editor PDF Profissional - 2026</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #111; color: #eee; margin: 0; display: flex; flex-direction: column; align-items: center; }
        #header { background: #222; width: 100%; padding: 15px; display: flex; justify-content: center; gap: 15px; border-bottom: 2px solid #444; position: sticky; top: 0; z-index: 999; }
        #canvas-wrapper { position: relative; margin: 20px; background: white; box-shadow: 0 0 30px rgba(0,0,0,0.8); display: none; }
        canvas { display: block; }
        .box-field {
            position: absolute; width: 160px; height: 100px;
            background: rgba(0, 123, 255, 0.4); border: 2px solid #007bff;
            color: white; display: flex; align-items: center; justify-content: center;
            cursor: move; touch-action: none; font-size: 10px; font-weight: bold;
            box-sizing: border-box; text-shadow: 1px 1px 2px black;
        }
        button { padding: 10px 20px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; }
        .btn-up { background: #fff; color: #000; }
        .btn-add { background: #007bff; color: white; display: none; }
        .btn-save { background: #28a745; color: white; display: none; }
    </style>
</head>
<body>

<div id="header">
    <input type="file" id="input-file" accept=".pdf" style="display:none">
    <button class="btn-up" onclick="document.getElementById('input-file').click()">1. Carregar PDF</button>
    <button id="add-btn" class="btn-add">2. Criar Campos</button>
    <button id="save-btn" class="btn-save">3. Baixar PDF Editável</button>
</div>

<div id="canvas-wrapper">
    <canvas id="pdf-canvas"></canvas>
</div>

<script>
    const pdfjs = window['pdfjs-dist/build/pdf'];
    pdfjs.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    let pdfData = null;
    let renderScale = 1.5;

    // --- CARREGAR PDF ---
    document.getElementById('input-file').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        pdfData = await file.arrayBuffer();

        const loadingTask = pdfjs.getDocument({ data: pdfData });
        const pdf = await loadingTask.promise;
        const page = await pdf.getPage(1);

        const viewport = page.getViewport({ scale: renderScale });
        const canvas = document.getElementById('pdf-canvas');
        const context = canvas.getContext('2d');
        canvas.height = viewport.height;
        canvas.width = viewport.width;

        await page.render({ canvasContext: context, viewport: viewport }).promise;

        document.getElementById('canvas-wrapper').style.display = 'block';
        document.getElementById('add-btn').style.display = 'inline-block';
    });

    // --- CRIAR CAMPOS ---
    document.getElementById('add-btn').addEventListener('click', () => {
        spawn(80, 80, "IMAGEM 1");
        spawn(280, 80, "IMAGEM 2");
        document.getElementById('add-btn').style.display = 'none';
        document.getElementById('save-btn').style.display = 'inline-block';
    });

    function spawn(x, y, label) {
        const div = document.createElement('div');
        div.className = 'box-field';
        div.innerText = label;
        div.style.left = x + 'px';
        div.style.top = y + 'px';
        document.getElementById('canvas-wrapper').appendChild(div);

        interact(div).draggable({
            listeners: { move(e) {
                let t = e.target;
                let nx = (parseFloat(t.getAttribute('data-x')) || 0) + e.dx;
                let ny = (parseFloat(t.getAttribute('data-y')) || 0) + e.dy;
                t.style.transform = `translate(${nx}px, ${ny}px)`;
                t.setAttribute('data-x', nx);
                t.setAttribute('data-y', ny);
            }}
        }).resizable({
            edges: { left: true, right: true, bottom: true, top: true },
            listeners: { move(e) {
                let t = e.target;
                let nx = (parseFloat(t.getAttribute('data-x')) || 0) + e.deltaRect.left;
                let ny = (parseFloat(t.getAttribute('data-y')) || 0) + e.deltaRect.top;
                Object.assign(t.style, {
                    width: `${e.rect.width}px`,
                    height: `${e.rect.height}px`,
                    transform: `translate(${nx}px, ${ny}px)`
                });
                t.setAttribute('data-x', nx);
                t.setAttribute('data-y', ny);
            }}
        });
    }

    // --- SALVAR PDF (CORREÇÃO CRÍTICA) ---
    document.getElementById('save-btn').addEventListener('click', async () => {
        try {
            const { PDFDocument } = PDFLib;
            
            // CARREGA O PDF IGNORANDO ERROS DE CRIPTOGRAFIA LEVES
            const doc = await PDFDocument.load(pdfData, { ignoreEncryption: true });
            const form = doc.getForm();
            const page = doc.getPage(0);
            const { width, height } = page.getSize();
            const canvas = document.getElementById('pdf-canvas');

            const rx = width / canvas.width;
            const ry = height / canvas.height;

            const boxes = document.querySelectorAll('.box-field');
            boxes.forEach((box, i) => {
                const dx = parseFloat(box.getAttribute('data-x')) || 0;
                const dy = parseFloat(box.getAttribute('data-y')) || 0;
                const L = parseFloat(box.style.left);
                const T = parseFloat(box.style.top);

                const finalX = (L + dx) * rx;
                const finalY = height - ((T + dy + box.offsetHeight) * ry);
                const finalW = box.offsetWidth * rx;
                const finalH = box.offsetHeight * ry;

                // Cria o campo de botão (que funciona como campo de imagem)
                const btn = form.createButton(`img_field_${i}_${Math.random()}`);
                btn.addToPage(page, { 
                    x: finalX, 
                    y: finalY, 
                    width: finalW, 
                    height: finalH 
                });
            });

            // GERA OS BYTES
            const pdfBytes = await doc.save();
            
            // DOWNLOAD FORÇADO
            const blob = new Blob([pdfBytes], { type: 'application/pdf' });
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = "meu_pdf_editavel.pdf";
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

            alert("PDF gerado com sucesso!");
        } catch (err) {
            console.error("ERRO DETALHADO:", err);
            alert("Não foi possível processar este PDF. Motivo: " + err.message);
        }
    });
</script>

</body>
</html>
