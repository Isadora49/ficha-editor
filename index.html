<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Editor PDF Pro - 2026</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <style>
        :root { --accent: #3b82f6; --bg: #111827; }
        body { font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; align-items: center; }
        header { background: #1f2937; width: 100%; padding: 20px; display: flex; justify-content: center; gap: 15px; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #374151; }
        #canvas-wrapper { position: relative; margin: 30px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); display: none; background: white; }
        canvas { display: block; }
        .field-box {
            position: absolute; width: 120px; height: 80px; background: rgba(59, 130, 246, 0.4);
            border: 2px solid var(--accent); color: white; display: flex; align-items: center;
            justify-content: center; cursor: move; touch-action: none; font-size: 10px; font-weight: bold;
            box-sizing: border-box; text-shadow: 1px 1px 2px black;
        }
        button { padding: 12px 20px; border-radius: 8px; border: none; cursor: pointer; font-weight: 600; transition: all 0.2s; }
        .btn-load { background: #f3f4f6; color: #111827; }
        .btn-add { background: var(--accent); color: white; display: none; }
        .btn-save { background: #10b981; color: white; display: none; }
        button:hover { opacity: 0.9; transform: translateY(-2px); }
        #status-msg { margin-top: 10px; color: #9ca3af; font-size: 14px; }
    </style>
</head>
<body>

<header>
    <input type="file" id="input-pdf" accept=".pdf" style="display:none">
    <button class="btn-load" onclick="document.getElementById('input-pdf').click()">1. Abrir PDF</button>
    <button id="btn-add" class="btn-add">2. Criar Campos</button>
    <button id="btn-save" class="btn-save">3. Baixar PDF Pronto</button>
</header>

<div id="status-msg">Selecione um arquivo PDF para começar.</div>

<div id="canvas-wrapper">
    <canvas id="pdf-render"></canvas>
</div>

<script>
    const pdfjs = window['pdfjs-dist/build/pdf'];
    pdfjs.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    let pdfData = null;
    let viewScale = 1.5;

    // --- CARREGAR PDF ---
    document.getElementById('input-pdf').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        pdfData = await file.arrayBuffer();
        const loadingTask = pdfjs.getDocument({ data: pdfData });
        const pdf = await loadingTask.promise;
        const page = await pdf.getPage(1);
        
        const viewport = page.getViewport({ scale: viewScale });
        const canvas = document.getElementById('pdf-render');
        const context = canvas.getContext('2d');
        canvas.height = viewport.height;
        canvas.width = viewport.width;

        await page.render({ canvasContext: context, viewport: viewport }).promise;
        
        document.getElementById('canvas-wrapper').style.display = 'block';
        document.getElementById('btn-add').style.display = 'inline-block';
        document.getElementById('status-msg').innerText = "PDF carregado! Agora adicione os campos.";
    });

    // --- GERENCIAR CAMPOS ---
    document.getElementById('btn-add').addEventListener('click', () => {
        spawnField('CAMPO IMAGEM 1', 40, 40);
        spawnField('CAMPO IMAGEM 2', 200, 40);
        document.getElementById('btn-add').style.display = 'none';
        document.getElementById('btn-save').style.display = 'inline-block';
    });

    function spawnField(text, x, y) {
        const wrap = document.getElementById('canvas-wrapper');
        const div = document.createElement('div');
        div.className = 'field-box';
        div.innerText = text;
        div.style.left = x + 'px';
        div.style.top = y + 'px';
        div.setAttribute('data-x', 0);
        div.setAttribute('data-y', 0);
        wrap.appendChild(div);

        interact(div).draggable({
            listeners: { move(event) {
                let x = (parseFloat(event.target.getAttribute('data-x')) || 0) + event.dx;
                let y = (parseFloat(event.target.getAttribute('data-y')) || 0) + event.dy;
                event.target.style.transform = `translate(${x}px, ${y}px)`;
                event.target.setAttribute('data-x', x);
                event.target.setAttribute('data-y', y);
            }}
        }).resizable({
            edges: { left: true, right: true, bottom: true, top: true },
            listeners: { move(event) {
                let x = (parseFloat(event.target.getAttribute('data-x')) || 0) + event.deltaRect.left;
                let y = (parseFloat(event.target.getAttribute('data-y')) || 0) + event.deltaRect.top;
                Object.assign(event.target.style, {
                    width: `${event.rect.width}px`,
                    height: `${event.rect.height}px`,
                    transform: `translate(${x}px, ${y}px)`
                });
                event.target.setAttribute('data-x', x);
                event.target.setAttribute('data-y', y);
            }}
        });
    }

    // --- SALVAR E BAIXAR (CONSERTADO) ---
    document.getElementById('btn-save').addEventListener('click', async () => {
        try {
            const { PDFDocument } = PDFLib;
            const pdfDoc = await PDFDocument.load(pdfData);
            const form = pdfDoc.getForm();
            const page = pdfDoc.getPage(0);
            const { width, height } = page.getSize();
            const canvas = document.getElementById('pdf-render');

            const scaleX = width / canvas.width;
            const scaleY = height / canvas.height;

            const boxes = document.querySelectorAll('.field-box');
            
            boxes.forEach((box, i) => {
                const dx = parseFloat(box.getAttribute('data-x')) || 0;
                const dy = parseFloat(box.getAttribute('data-y')) || 0;
                const left = parseFloat(box.style.left) || 0;
                const top = parseFloat(box.style.top) || 0;

                // Coordenadas PDF (Origem é o canto inferior esquerdo)
                const finalX = (left + dx) * scaleX;
                const finalY = height - ((top + dy + box.offsetHeight) * scaleY);
                const finalW = box.offsetWidth * scaleX;
                const finalH = box.offsetHeight * scaleY;

                // Criar campo de botão (PushButton) que aceita imagem
                const fieldName = `img_field_${i}_${Date.now()}`;
                const button = form.createButton(fieldName);
                button.addToPage(page, {
                    x: Math.max(0, finalX),
                    y: Math.max(0, finalY),
                    width: Math.max(10, finalW),
                    height: Math.max(10, finalH)
                });
            });

            const pdfBytes = await pdfDoc.save();
            const blob = new Blob([pdfBytes], { type: 'application/pdf' });
            const url = URL.createObjectURL(blob);
            
            const a = document.createElement('a');
            a.href = url;
            a.download = "meu_pdf_editavel.pdf";
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            
            document.getElementById('status-msg').innerText = "Sucesso! Verifique seus downloads.";
        } catch (err) {
            console.error("ERRO DETALHADO:", err);
            alert("Erro ao processar o PDF. Tente com um arquivo menor ou sem proteção de senha.");
        }
    });
</script>

</body>
</html>
