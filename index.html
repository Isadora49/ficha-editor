<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Editor PDF Profissional 2026</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #1a1a1a; color: white; margin: 0; display: flex; flex-direction: column; align-items: center; }
        #nav { background: #252525; width: 100%; padding: 15px; display: flex; justify-content: center; gap: 15px; position: sticky; top: 0; z-index: 1000; border-bottom: 2px solid #444; }
        #editor-area { position: relative; margin: 20px; background: white; box-shadow: 0 0 40px rgba(0,0,0,0.8); display: none; overflow: hidden; }
        canvas { display: block; }
        .img-field {
            position: absolute; width: 160px; height: 90px;
            background: rgba(0, 102, 204, 0.4); border: 2px solid #0066cc;
            color: white; display: flex; align-items: center; justify-content: center;
            cursor: move; touch-action: none; user-select: none; font-weight: bold; font-size: 10px;
            box-sizing: border-box; text-shadow: 1px 1px 2px black;
        }
        button { padding: 12px 20px; border: none; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; }
        .btn-load { background: #eee; color: #111; }
        .btn-add { background: #0066cc; color: white; display: none; }
        .btn-dl { background: #28a745; color: white; display: none; }
        button:hover { transform: scale(1.05); opacity: 0.9; }
        #msg { position: fixed; bottom: 10px; padding: 10px; border-radius: 5px; background: #333; font-size: 12px; }
    </style>
</head>
<body>

<div id="nav">
    <input type="file" id="input-file" accept=".pdf" style="display:none">
    <button class="btn-load" onclick="document.getElementById('input-file').click()">1. Escolher PDF</button>
    <button id="btn-add" class="btn-add">2. Criar Campos</button>
    <button id="btn-dl" class="btn-dl">3. Baixar PDF Pronto</button>
</div>

<div id="editor-area">
    <canvas id="pdf-canvas"></canvas>
</div>

<div id="msg">Aguardando arquivo...</div>

<script>
    const pdfjs = window['pdfjs-dist/build/pdf'];
    pdfjs.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    let pdfData = null; // Guardará os bytes do PDF
    const renderScale = 1.5;

    // --- CARREGAR PDF ---
    document.getElementById('input-file').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        log("Processando PDF...");
        const arrayBuffer = await file.arrayBuffer();
        pdfData = new Uint8Array(arrayBuffer); // Cópia segura dos dados

        const loadingTask = pdfjs.getDocument({ data: pdfData });
        const pdf = await loadingTask.promise;
        const page = await pdf.getPage(1);
        
        const viewport = page.
