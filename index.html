<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor de PDF - Campos de Imagem 2026</title>
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    
    <style>
        :root { --accent: #2563eb; --bg: #09090b; --panel: #18181b; }
        body { font-family: sans-serif; background: var(--bg); color: #fff; margin: 0; display: flex; flex-direction: column; align-items: center; }
        #toolbar { background: var(--panel); width: 100%; padding: 1rem; display: flex; justify-content: center; gap: 1rem; position: sticky; top: 0; z-index: 100; border-bottom: 1px solid #3f3f46; }
        #editor-wrapper { position: relative; margin: 2rem; background: #fff; display: none; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); }
        canvas { display: block; }
        .image-field {
            position: absolute; width: 150px; height: 100px;
            background: rgba(37, 99, 235, 0.3); border: 2px dashed var(--accent);
            color: #000; font-weight: bold; display: flex; align-items: center; justify-content: center;
            cursor: move; touch-action: none; user-select: none; z-index: 50; box-sizing: border-box;
        }
        button { padding: 0.6rem 1.2rem; border-radius: 0.5rem; border: none; cursor: pointer; font-weight: 600; transition: 0.2s; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-success { background: #16a34a; color: white; display: none; }
        .btn-upload { background: #f4f4f5; color: #18181b; }
        button:hover { opacity: 0.9; transform: translateY(-1px); }
        #log { position: fixed; bottom: 1rem; background: #000; padding: 0.5rem 1rem; border-radius: 2rem; font-size: 0.8rem; color: #10b981; }
    </style>
</head>
<body>

<div id="toolbar">
    <input type="file" id="pdf-input" accept=".pdf" style="display:none">
    <button class="btn-upload" onclick="document.getElementById('pdf-input').click()">1. Selecionar PDF</button>
    <button id="add-btn" class="btn-primary" style="display:none">2. Adicionar Campos</button>
    <button id="save-btn" class="btn-success">3. Gerar e Baixar PDF</button>
</div>

<div id="editor-wrapper">
    <canvas id="pdf-canvas"></canvas>
    </div>

<div id="log">Aguardando arquivo...</div>

<script>
    const pdfjsLib = window['pdfjs-dist/build/pdf'];
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

    let pdfBytes = null;
    let renderScale = 1.5;

    function setStatus(msg, err = false) {
        const log = document.getElementById('log');
        log.innerText = msg;
        log.style.color = err ? "#ef4444" : "#10b981";
    }

    // --- CARREGAR PDF ---
    document.getElementById('pdf-input').addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        setStatus("Lendo PDF...");
        pdfBytes = await file.arrayBuffer();
        
        const loadingTask = pdfjsLib.getDocument({ data: pdfBytes });
        const pdf = await loadingTask.promise;
        const page = await pdf.getPage(1);
        
        const viewport = page.getViewport({ scale: renderScale });
        const canvas = document.getElementById('pdf-canvas');
        const context = canvas.getContext('2d');
        canvas.height = viewport.height;
        canvas.width = viewport.width;

        await page.render({ canvasContext: context, viewport: viewport }).promise;
        
        document.getElementById('editor-wrapper').style.display = 'block';
        document.getElementById('add-btn').style.display = 'block';
        setStatus("PDF renderizado. Clique em Adicionar Campos.");
    });

    // --- CRIAR CAMPOS (DRAG & RESIZE) ---
    document.getElementById('add-btn').addEventListener('click', () => {
        createField('CAMPO_1', 40, 40);
        createField('CAMPO_2', 200, 40);
        document.getElementById('add-btn').style.display = 'none';
        document.getElementById('save-btn').style.display = 'block';
    });

    function createField(id, x, y) {
        const wrapper = document.getElementById('editor-wrapper');
        const div = document.createElement('div');
        div.className = 'image-field';
        div.id = id;
        div.innerText = "Imagem";
        div.style.left = x + 'px';
        div.style.top = y + 'px';
        wrapper.appendChild(div);

        interact(div).draggable({
            listeners: {
                move(event) {
                    const target = event.target;
                    // Uso de propriedades numéricas puras para evitar NaN
                    const x = (parseFloat(target.getAttribute('data-x')) || 0) + event.dx;
                    const y = (parseFloat(target.getAttribute('data-y')) || 0) + event.dy;
                    target.style.transform = `translate(${x}px, ${y}px)`;
                    target.setAttribute('data-x', x);
                    target.setAttribute('data-y', y);
                }
            }
        }).resizable({
            edges: { left: true, right: true, bottom: true, top: true },
            listeners: {
                move(event) {
                    const target = event.target;
                    let x = (parseFloat(target.getAttribute('data-x')) || 0);
                    let y = (parseFloat(target.getAttribute('data-y')) || 0);

                    target.style.width = event.rect.width + 'px';
                    target.style.height = event.rect.height + 'px';

                    x += event.deltaRect.left;
                    y += event.deltaRect.top;

                    target.style.transform = `translate(${x}px, ${y}px)`;
                    target.setAttribute('data-x', x);
                    target.setAttribute('data-y', y);
                }
            }
        });
    }

    // --- SALVAR PDF (BLINDAGEM CONTRA NaN) ---
    document.getElementById('save-btn').addEventListener('click', async () => {
        try {
            setStatus("Processando PDF final...");
            const { PDFDocument } = PDFLib;
            const pdfDoc = await PDFDocument.load(pdfBytes);
            const form = pdfDoc.getForm();
            const page = pdfDoc.getPage(0);
            const { width, height } = page.getSize();
            
            const canvas = document.getElementById('pdf-canvas');
            // Proporção entre o que vemos na tela e o tamanho real do PDF
            const scaleX = width / canvas.width;
            const scaleY = height / canvas.height;

            const fields = document.querySelectorAll('.image-field');
            
            fields.forEach((div, index) => {
                // Captura a posição visual exata (BoundingBox)
                const rect = div.getBoundingClientRect();
                const canvasRect = canvas.getBoundingClientRect();

                const visualX = rect.left - canvasRect.left;
                const visualY = rect.top - canvasRect.top;

                // CONVERSÃO PARA PDF (Eixo Y invertido no PDF)
                // Usamos Math.round e || 0 para garantir que nunca seja NaN
                const pdfX = Math.round(visualX * scaleX) || 0;
                const pdfY = Math.round(height - ((visualY + rect.height) * scaleY)) || 0;
                const pdfW = Math.round(rect.width * scaleX) || 50;
                const pdfH = Math.round(rect.height * scaleY) || 50;

                const button = form.createButton(`campo_imagem_${index}_${Math.floor(Math.random()*1000)}`);
                
                // Aplicação final com proteção de tipo
                button.addToPage(page, {
                    x: Number(pdfX),
                    y: Number(pdfY),
                    width: Number(pdfW),
                    height: Number(pdfH)
                });
            });

            const finalPdfBytes = await pdfDoc.save();
            const blob = new Blob([finalPdfBytes], { type: 'application/pdf' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "pdf_editavel_com_campos.pdf";
            a.click();
            setStatus("Download iniciado!");
        } catch (err) {
            console.error(err);
            setStatus("Erro ao salvar: " + err.message, true);
        }
    });
</script>
</body>
</html>
