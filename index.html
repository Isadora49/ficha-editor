<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor PDF Profissional 2026</title>
    
    <script src="https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/interactjs/dist/interact.min.js"></script>
    
    <style>
        :root { --primary: #00dc82; --bg: #0b0e14; --surface: #1e293b; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: white; margin: 0; display: flex; flex-direction: column; align-items: center; }
        
        #header { background: var(--surface); width: 100%; padding: 20px; display: flex; justify-content: center; gap: 15px; position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid #334155; }
        
        #editor-wrapper { position: relative; margin: 40px; background: white; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); display: none; }
        canvas { display: block; }
        
        .field-box {
            position: absolute; width: 150px; height: 100px;
            background: rgba(0, 220, 130, 0.3); border: 2px solid var(--primary);
            color: #000; font-weight: bold; display: flex; align-items: center; justify-content: center;
            cursor: move; touch-action: none; user-select: none; z-index: 10; font-size: 12px;
        }
        
        button { padding: 12px 24px; cursor: pointer; border: none; border-radius: 8px; font-weight: 600; transition: all 0.2s; }
        .btn-load { background: #f8fafc; color: #0f172a; }
        .btn-add { background: var(--primary); color: #0b0e14; display: none; }
        .btn-save { background: #38bdf8; color: #0b0e14; display: none; }
        button:hover { transform: translateY(-2px); opacity: 0.9; }
        
        #log { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); background: #000; padding: 10px 20px; border-radius: 20px; font-size: 13px; color: var(--primary); border: 1px solid var(--primary); z-index: 2000; }
    </style>
</head>
<body>

<div id="header">
    <input type="file" id="pdf-file" accept=".pdf" style="display:none">
    <button class="btn-load" onclick="document.getElementById('pdf-file').click()">1. Escolher PDF</button>
    <button id="add-btn" class="btn-add">2. Criar Campos</button>
    <button id="save-btn" class="btn-save">3. Baixar PDF Editável</button>
</div>

<div id="editor-wrapper">
    <canvas id="pdf-canvas"></canvas>
</div>

<div id="log">Aguardando arquivo...</div>

<script>
    const { PDFDocument } = PDFLib;
    const pdfjs = window['pdfjs-dist/build/pdf'];
    pdfjs.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.worker.min.js';

    let pdfRawBytes = null;
    let renderScale = 1.5;

    function status(msg, err = false) {
        const l = document.getElementById('log');
        l.innerText = msg;
        l.style.color = err ? '#ff4d4d' : '#00dc82';
        l.style.borderColor = err ? '#ff4d4d' : '#00dc82';
    }

    // 1. CARREGAR PDF
    document.getElementById('pdf-file').addEventListener('change', async (e) => {
        try {
            const file = e.target.files[0];
            if (!file) return;

            status("Processando PDF...");
            pdfRawBytes = await file.arrayBuffer();
            
            // Clonamos o buffer para o PDF.js não "detachar" o original
            const displayBytes = pdfRawBytes.slice(0);
            const loading = pdfjs.getDocument({ data: displayBytes });
            const pdf = await loading.promise;
            const page = await pdf.getPage(1);
            
            const viewport = page.getViewport({ scale: renderScale });
            const canvas = document.getElementById('pdf-canvas');
            const ctx = canvas.getContext('2d');
            canvas.height = viewport.height;
            canvas.width = viewport.width;

            const wrapper = document.getElementById('editor-wrapper');
            wrapper.style.width = viewport.width + 'px';
            wrapper.style.height = viewport.height + 'px';

            await page.render({ canvasContext: ctx, viewport: viewport }).promise;
            
            wrapper.style.display = 'block';
            document.getElementById('add-btn').style.display = 'inline-block';
            status("PDF carregado com sucesso!");
        } catch (e) {
            status("Erro ao ler PDF: " + e.message, true);
        }
    });

    // 2. CRIAR CAMPOS (DRAG & RESIZE)
    document.getElementById('add-btn').addEventListener('click', () => {
        spawn('CAMPO IMAGEM 1', 40, 40);
        spawn('CAMPO IMAGEM 2', 200, 40);
        document.getElementById('add-btn').style.display = 'none';
        document.getElementById('save-btn').style.display = 'inline-block';
        status("Arraste e ajuste os campos.");
    });

    function spawn(txt, x, y) {
        const div = document.createElement('div');
        div.className = 'field-box';
        div.innerText = txt;
        div.style.left = x + 'px';
        div.style.top = y
